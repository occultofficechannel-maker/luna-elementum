<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Luna Elementum" />
  <meta name="description" content="달의 주기 · 4원소 의식 · QR 공유 · 유튜브 · 루나 타로" />
  <link rel="manifest" href="manifest.json" />
  <title>Luna Elementum · 루나 엘레멘툼</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* ===========================
       CSS VARIABLES & RESET
    =========================== */
    :root {
      --clr-bg: #0a0a1a;
      --clr-surface: rgba(255,255,255,0.05);
      --clr-border: rgba(255,255,255,0.10);
      --clr-text: #e8e0f0;
      --clr-text-dim: #9a8fb0;
      --clr-accent: #c8a0f8;
      --clr-glow: rgba(200, 160, 248, 0.3);

      /* Element themes */
      --elem-primary: #c8a0f8;
      --elem-secondary: #9060c8;
      --elem-glow: rgba(200, 160, 248, 0.25);
      --elem-bg1: rgba(80, 20, 120, 0.35);
      --elem-bg2: rgba(40, 5, 80, 0.20);

      --transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      --radius: 20px;
    }

    /* Fire */
    .theme-fire {
      --elem-primary: #ff7c2a;
      --elem-secondary: #e63c00;
      --elem-glow: rgba(255, 100, 30, 0.30);
      --elem-bg1: rgba(180, 40, 0, 0.35);
      --elem-bg2: rgba(100, 20, 0, 0.20);
      --clr-accent: #ff9a50;
    }
    /* Water */
    .theme-water {
      --elem-primary: #38c8e8;
      --elem-secondary: #0070a8;
      --elem-glow: rgba(40, 180, 220, 0.30);
      --elem-bg1: rgba(0, 80, 140, 0.35);
      --elem-bg2: rgba(0, 40, 80, 0.20);
      --clr-accent: #60d8f8;
    }
    /* Earth */
    .theme-earth {
      --elem-primary: #70c850;
      --elem-secondary: #4a7a20;
      --elem-glow: rgba(80, 180, 60, 0.28);
      --elem-bg1: rgba(30, 80, 10, 0.35);
      --elem-bg2: rgba(60, 40, 0, 0.20);
      --clr-accent: #90e070;
    }
    /* Air */
    .theme-air {
      --elem-primary: #a0c8ff;
      --elem-secondary: #6060d0;
      --elem-glow: rgba(140, 180, 255, 0.28);
      --elem-bg1: rgba(40, 40, 140, 0.35);
      --elem-bg2: rgba(20, 20, 80, 0.20);
      --clr-accent: #b8d8ff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { height: 100%; }

    body {
      min-height: 100%;
      background-color: var(--clr-bg);
      color: var(--clr-text);
      font-family: 'Noto Sans KR', sans-serif;
      overflow-x: hidden;
      transition: background-color var(--transition);
    }

    /* ===========================
       STAR BACKGROUND
    =========================== */
    #starfield {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--dur, 3s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
      opacity: var(--op, 0.6);
    }

    @keyframes twinkle {
      0%, 100% { opacity: var(--op, 0.6); transform: scale(1); }
      50% { opacity: 0.1; transform: scale(0.5); }
    }

    /* ===========================
       ELEMENT GLOW OVERLAY
    =========================== */
    #glow-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: radial-gradient(ellipse at 50% 60%, var(--elem-bg1) 0%, var(--elem-bg2) 50%, transparent 75%);
      transition: background var(--transition);
    }

    /* ===========================
       MAIN WRAPPER
    =========================== */
    #app {
      position: relative;
      z-index: 2;
      max-width: 430px;
      margin: 0 auto;
      padding: 0 0 100px;
      min-height: 100vh;
    }

    /* ===========================
       HEADER
    =========================== */
    header {
      text-align: center;
      padding: 40px 20px 20px;
    }

    .app-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--elem-primary);
      text-shadow: 0 0 18px var(--elem-glow), 0 0 36px var(--elem-glow), 0 0 60px var(--elem-glow);
      transition: color var(--transition), text-shadow var(--transition);
      line-height: 1.3;
    }

    .app-subtitle {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      color: var(--clr-text-dim);
      letter-spacing: 4px;
      margin-top: 4px;
      text-transform: uppercase;
    }

    .current-date {
      margin-top: 10px;
      font-size: 13px;
      color: var(--clr-text-dim);
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 300;
    }

    /* ===========================
       MOON SECTION
    =========================== */
    .moon-section {
      padding: 10px 20px 20px;
      text-align: center;
    }

    .moon-visual-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto 20px;
      width: 160px;
      height: 160px;
      position: relative;
    }

    .moon-glow-ring {
      position: absolute;
      inset: -15px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--elem-glow) 0%, transparent 70%);
      transition: background var(--transition);
      animation: pulseMoon 4s ease-in-out infinite;
    }

    @keyframes pulseMoon {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.08); opacity: 0.7; }
    }

    #moon-svg {
      width: 140px;
      height: 140px;
      filter: drop-shadow(0 0 12px rgba(220, 200, 255, 0.5));
      position: relative;
      z-index: 1;
    }

    .moon-info {
      margin-bottom: 6px;
    }

    .moon-phase-name {
      font-family: 'Cinzel', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--clr-text);
      letter-spacing: 1px;
    }

    .moon-phase-name-ko {
      font-family: 'Noto Serif KR', serif;
      font-size: 14px;
      color: var(--elem-primary);
      transition: color var(--transition);
      margin-top: 2px;
    }

    .moon-illumination {
      margin-top: 8px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--clr-surface);
      border: 1px solid var(--clr-border);
      border-radius: 30px;
      padding: 5px 16px;
      font-size: 13px;
      color: var(--clr-text-dim);
    }

    .illum-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--elem-primary);
      box-shadow: 0 0 6px var(--elem-glow);
      transition: background var(--transition), box-shadow var(--transition);
    }

    .moon-energy-card {
      margin: 14px 0 0;
      background: var(--clr-surface);
      border: 1px solid var(--clr-border);
      border-radius: var(--radius);
      padding: 14px 18px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      text-align: left;
    }

    .moon-energy-label {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--elem-primary);
      text-transform: uppercase;
      transition: color var(--transition);
      margin-bottom: 6px;
    }

    .moon-energy-text {
      font-size: 13px;
      line-height: 1.7;
      color: var(--clr-text-dim);
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 300;
    }

    /* ===========================
       ELEMENT SELECTOR
    =========================== */
    .element-section {
      padding: 0 20px 20px;
    }

    .section-label {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--clr-text-dim);
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 12px;
    }

    .element-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .elem-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 9px 5px;
      border-radius: 13px;
      border: 1.5px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(10px);
      cursor: pointer;
      transition: all 0.35s ease;
      position: relative;
      overflow: hidden;
    }

    .elem-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      opacity: 0;
      transition: opacity 0.35s;
    }

    .elem-btn.fire::before { background: radial-gradient(circle at 50% 100%, rgba(255,100,20,0.35) 0%, transparent 70%); }
    .elem-btn.water::before { background: radial-gradient(circle at 50% 100%, rgba(30,170,220,0.35) 0%, transparent 70%); }
    .elem-btn.earth::before { background: radial-gradient(circle at 50% 100%, rgba(60,170,50,0.35) 0%, transparent 70%); }
    .elem-btn.air::before  { background: radial-gradient(circle at 50% 100%, rgba(120,160,255,0.35) 0%, transparent 70%); }

    .elem-btn.active::before, .elem-btn:hover::before { opacity: 1; }

    .elem-btn.fire.active  { border-color: #ff7c2a; box-shadow: 0 0 18px rgba(255,100,20,0.5), inset 0 0 10px rgba(255,100,20,0.1); }
    .elem-btn.water.active { border-color: #38c8e8; box-shadow: 0 0 18px rgba(30,180,220,0.5), inset 0 0 10px rgba(30,180,220,0.1); }
    .elem-btn.earth.active { border-color: #70c850; box-shadow: 0 0 18px rgba(80,180,50,0.5), inset 0 0 10px rgba(80,180,50,0.1); }
    .elem-btn.air.active   { border-color: #a0c8ff; box-shadow: 0 0 18px rgba(140,180,255,0.5), inset 0 0 10px rgba(140,180,255,0.1); }

    .elem-icon { font-size: 22px; line-height: 1; }

    .elem-name {
      font-size: 10px;
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 500;
      color: var(--clr-text-dim);
      transition: color 0.3s;
    }

    .elem-btn.fire.active  .elem-name { color: #ff9a50; }
    .elem-btn.water.active .elem-name { color: #60d8f8; }
    .elem-btn.earth.active .elem-name { color: #90e070; }
    .elem-btn.air.active   .elem-name { color: #b8d8ff; }

    /* ===========================
       RITUAL SECTION
    =========================== */
    .ritual-section {
      padding: 0 20px 20px;
    }

    .ritual-header {
      text-align: center;
      margin-bottom: 16px;
    }

    .ritual-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--elem-primary);
      transition: color var(--transition);
      line-height: 1.4;
    }

    .ritual-subtitle {
      font-size: 12px;
      color: var(--clr-text-dim);
      margin-top: 4px;
      font-family: 'Noto Sans KR', sans-serif;
    }

    /* ritual cards */
    .ritual-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--clr-border);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 12px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      transition: border-color var(--transition);
    }

    .ritual-card:hover {
      border-color: rgba(255,255,255,0.20);
    }

    .card-label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .card-label-icon {
      font-size: 16px;
    }

    .card-label-text {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--elem-primary);
      transition: color var(--transition);
    }

    .card-content {
      font-size: 13.5px;
      line-height: 1.75;
      color: var(--clr-text);
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 300;
    }

    .card-content strong {
      color: var(--clr-accent);
      font-weight: 500;
      transition: color var(--transition);
    }

    .tools-list {
      list-style: none;
      padding: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 4px;
    }

    .tools-list li {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 3px 11px;
      font-size: 12px;
      color: var(--clr-text-dim);
    }

    .steps-list {
      list-style: none;
      padding: 0;
      counter-reset: step-counter;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 4px;
    }

    .steps-list li {
      counter-increment: step-counter;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .steps-list li::before {
      content: counter(step-counter);
      min-width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--elem-bg1);
      border: 1px solid var(--elem-primary);
      color: var(--elem-primary);
      font-size: 11px;
      font-family: 'Cinzel', serif;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition), border-color var(--transition), color var(--transition);
      flex-shrink: 0;
      margin-top: 1px;
    }

    .steps-list li span {
      font-size: 13px;
      line-height: 1.7;
      color: var(--clr-text-dim);
    }

    .intent-text {
      font-size: 13.5px;
      line-height: 1.75;
      color: var(--clr-text);
      font-style: italic;
      padding-left: 10px;
      border-left: 2px solid var(--elem-primary);
      transition: border-color var(--transition);
    }

    /* divider */
    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, var(--clr-border), transparent);
      margin: 20px 0;
    }

    /* ===========================
       FADE ANIMATION
    =========================== */
    .fade-in {
      animation: fadeIn 0.5s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===========================
       SCROLLBAR
    =========================== */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
  

    /* ===========================
       HEADER ACTIONS / VERSION
    =========================== */
    .header-actions {
      margin-top: 16px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .action-btn {
      appearance: none;
      border: 1px solid var(--clr-border);
      background: rgba(255,255,255,0.05);
      color: var(--clr-text);
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
      transition: transform .2s ease, border-color .25s ease, box-shadow .25s ease, background .25s ease;
    }
    .action-btn:active { transform: scale(0.98); }
    .action-btn:hover {
      border-color: var(--elem-primary);
      box-shadow: 0 0 0 1px var(--elem-primary), 0 0 18px var(--elem-glow);
      background: rgba(255,255,255,0.08);
    }

    .action-btn svg { width: 16px; height: 16px; }

    .youtube-btn {
      border-color: rgba(255, 74, 74, 0.55) !important;
      color: #ffdcdc;
      background: rgba(120, 12, 12, 0.22);
    }
    .youtube-btn:hover {
      border-color: rgba(255, 74, 74, 0.95) !important;
      box-shadow: 0 0 0 1px rgba(255,74,74,0.65), 0 0 22px rgba(255,74,74,0.25) !important;
      background: rgba(160, 12, 12, 0.28);
    }

    .version-badge {
      margin-top: 12px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.04);
      font-size: 11px;
      letter-spacing: 1.5px;
      color: var(--clr-text-dim);
    }

    /* ===========================
       TAROT SECTION
    =========================== */
    .tarot-section {
      margin: 0 20px;
      padding: 20px 16px 16px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.035));
      border: 1px solid var(--clr-border);
      box-shadow: 0 18px 50px rgba(0,0,0,0.24);
    }

    .tarot-title {
      text-align: center;
      font-family: 'Cinzel Decorative', serif;
      font-size: 22px;
      letter-spacing: 1.5px;
      color: var(--elem-primary);
      text-shadow: 0 0 12px var(--elem-glow);
      margin-bottom: 6px;
    }

    .tarot-subtitle {
      text-align: center;
      color: var(--clr-text-dim);
      font-size: 13px;
      line-height: 1.6;
      margin: 0 auto 16px;
      max-width: 320px;
    }

    .tarot-draw-btn {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.12);
      background: linear-gradient(135deg, color-mix(in srgb, var(--elem-primary) 24%, transparent), rgba(255,255,255,0.05));
      color: #fff;
      border-radius: 16px;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 0 20px var(--elem-glow);
      transition: transform .2s ease, box-shadow .25s ease, border-color .25s ease;
    }
    .tarot-draw-btn:active { transform: scale(0.99); }

    .tarot-note {
      margin-top: 10px;
      font-size: 12px;
      color: var(--clr-text-dim);
      text-align: center;
      line-height: 1.5;
    }

    .tarot-result {
      margin-top: 16px;
      display: grid;
      gap: 14px;
    }

    .tarot-intro {
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--clr-text);
      font-size: 14px;
      line-height: 1.75;
      text-align: center;
    }

    .tarot-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .tarot-card {
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(18,18,36,0.92), rgba(8,8,22,0.98));
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 12px 30px rgba(0,0,0,0.26), inset 0 0 0 1px rgba(255,255,255,0.04);
      min-height: 240px;
    }

    .tarot-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top, rgba(255,255,255,0.10), transparent 55%);
      pointer-events: none;
    }

    .tarot-card-top {
      padding: 14px 12px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--clr-text-dim);
      font-size: 11px;
      letter-spacing: 1px;
    }

    .tarot-card-visual {
      height: 92px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 54px;
      filter: drop-shadow(0 0 18px var(--elem-glow));
    }

    .tarot-card-body {
      padding: 8px 12px 14px;
      display: grid;
      gap: 8px;
    }

    .tarot-card-name {
      text-align: center;
      font-family: 'Noto Serif KR', serif;
      font-size: 16px;
      color: #fff;
      line-height: 1.35;
    }

    .tarot-card-name small {
      display: block;
      margin-top: 3px;
      font-size: 11px;
      color: var(--clr-text-dim);
      letter-spacing: .6px;
    }

    .tarot-badge {
      margin: 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 78px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      font-size: 11px;
      color: var(--elem-primary);
    }

    .tarot-keywords {
      text-align: center;
      font-size: 12px;
      color: var(--clr-text-dim);
      line-height: 1.5;
      min-height: 36px;
    }

    .tarot-message {
      font-size: 12px;
      line-height: 1.65;
      color: var(--clr-text);
      text-align: center;
    }

    .tarot-footer-note {
      margin-top: 2px;
      text-align: center;
      font-size: 12px;
      color: var(--clr-text-dim);
      line-height: 1.6;
    }

    /* ===========================
       QR MODAL
    =========================== */
    .qr-modal {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(4, 4, 12, 0.82);
      backdrop-filter: blur(10px);
    }

/* =============================================
   LUNAR PHASE CALCULATION
============================================= */
function getLunarPhase(date) {
  // Known new moon reference: January 6, 2000
  const knownNewMoon = new Date('2000-01-06T18:14:00Z');
  const synodicMonth = 29.53058867; // days
  const diff = (date - knownNewMoon) / (1000 * 60 * 60 * 24);
  let age = diff % synodicMonth;
  if (age < 0) age += synodicMonth;

  const illumination = Math.round(((1 - Math.cos((age / synodicMonth) * 2 * Math.PI)) / 2) * 100);

  let phaseIndex;
  if      (age <  1.845)                   phaseIndex = 0; // New Moon
  else if (age <  1.845 + 5.383)           phaseIndex = 1; // Waxing Crescent
  else if (age <  1.845 + 5.383 + 1.845)  phaseIndex = 2; // First Quarter
  else if (age < 14.765)                   phaseIndex = 3; // Waxing Gibbous
  else if (age < 14.765 + 1.845)          phaseIndex = 4; // Full Moon
  else if (age < 14.765 + 1.845 + 5.383) phaseIndex = 5; // Waning Gibbous
  else if (age < 14.765 + 1.845 + 5.383 + 1.845) phaseIndex = 6; // Last Quarter
  else                                     phaseIndex = 7; // Waning Crescent

  return { age, illumination, phaseIndex };
}

/* =============================================
   MOON SVG RENDERER
============================================= */
function renderMoonSVG(age, phaseIndex) {
  const svg = document.getElementById('moon-svg');
  const cx = 70, cy = 70, r = 60;
  const synodic = 29.53058867;
  const t = ((age / synodic) % 1 + 1) % 1; // normalize 0~1

  const moonShadow = '#141126';
  const crater1 = '#b8a8d8';
  const crater2 = '#c0b0e0';

  if (phaseIndex === 0) {
    svg.innerHTML = `
      <defs>
        <radialGradient id="shadowGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#1a1630" stop-opacity="0.95"/>
          <stop offset="100%" stop-color="#0a0818" stop-opacity="0.98"/>
        </radialGradient>
      </defs>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="url(#shadowGrad)"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(200,180,255,0.10)" stroke-width="2"/>
    `;
    return;
  }

  const k = Math.cos(t * 2 * Math.PI); // +1:new, 0:quarter, -1:full
  const waxing = t < 0.5;

  function terminatorPathBottomToTop() {
    const pts = [];
    const steps = 72;
    for (let i = 0; i <= steps; i++) {
      const ratio = i / steps;
      const y = cy + r - (2 * r * ratio);
      const dy = y - cy;
      const span = Math.sqrt(Math.max(0, r * r - dy * dy));
      const x = waxing ? (cx + k * span) : (cx - k * span);
      pts.push(`${x.toFixed(2)} ${y.toFixed(2)}`);
    }
    return pts.join(' L ');
  }

  let pathD;
  if (phaseIndex === 4) {
    pathD = `M ${cx} ${cy - r} A ${r} ${r} 0 1 1 ${cx} ${cy + r} A ${r} ${r} 0 1 1 ${cx} ${cy - r} Z`;
  } else if (waxing) {
    pathD = [
      `M ${cx} ${cy - r}`,
      `A ${r} ${r} 0 0 1 ${cx} ${cy + r}`,
      `L ${terminatorPathBottomToTop()}`,
      'Z'
    ].join(' ');
  } else {
    pathD = [
      `M ${cx} ${cy - r}`,
      `A ${r} ${r} 0 0 0 ${cx} ${cy + r}`,
      `L ${terminatorPathBottomToTop()}`,
      'Z'
    ].join(' ');
  }

  svg.innerHTML = `
    <defs>
      <radialGradient id="moonGrad" cx="45%" cy="40%" r="55%">
        <stop offset="0%" stop-color="#efe8ff"/>
        <stop offset="60%" stop-color="#d8c9f6"/>
        <stop offset="100%" stop-color="#b19cd6"/>
      </radialGradient>
      <radialGradient id="shadowGrad" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#1a1630" stop-opacity="0.95"/>
        <stop offset="100%" stop-color="#0a0818" stop-opacity="0.98"/>
      </radialGradient>
      <clipPath id="moonDiscClip">
        <circle cx="${cx}" cy="${cy}" r="${r}"/>
      </clipPath>
      <clipPath id="moonLightClip">
        <path d="${pathD}"/>
      </clipPath>
    </defs>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="url(#shadowGrad)"/>
    <path d="${pathD}" fill="url(#moonGrad)" clip-path="url(#moonDiscClip)"/>
    <circle cx="${cx+20}" cy="${cy-15}" r="7" fill="${crater1}" opacity="0.22" clip-path="url(#moonLightClip)"/>
    <circle cx="${cx-22}" cy="${cy+12}" r="5" fill="${crater2}" opacity="0.20" clip-path="url(#moonLightClip)"/>
    <circle cx="${cx+5}"  cy="${cy+25}" r="4" fill="${crater1}" opacity="0.18" clip-path="url(#moonLightClip)"/>
    <circle cx="${cx-10}" cy="${cy-25}" r="3" fill="${crater2}" opacity="0.18" clip-path="url(#moonLightClip)"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(200,180,255,0.12)" stroke-width="2"/>
  `;
}

============================================= */
const YOUTUBE_URL = 'https://www.youtube.com/@cursekey';

function getShareUrl() {
  try {
    return `${location.origin}${location.pathname}`;
  } catch (e) {
    return location.href;
  }
}

function showToast(message) {
  const toast = document.getElementById('toast');
  if (!toast) return;
  toast.textContent = message;
  toast.classList.add('show');
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(() => toast.classList.remove('show'), 2200);
}

function buildQrUrl(url) {
  const encoded = encodeURIComponent(url);
  return `https://api.qrserver.com/v1/create-qr-code/?size=220x220&margin=12&data=${encoded}`;
}

function setQrImage(url) {
  const img = document.getElementById('qr-image');
  if (!img) return;
  const primary = buildQrUrl(url);
  const fallback = `https://quickchart.io/qr?text=${encodeURIComponent(url)}&size=220`;
  img.onerror = () => {
    if (!img.dataset.fallback) {
      img.dataset.fallback = '1';
      img.src = fallback;
    } else {
      showToast('QR 이미지를 불러오지 못했어요. 아래 링크를 복사해 주세요.');
    }
  };
  img.removeAttribute('data-fallback');
  img.src = primary;
}

function openQrModal() {
  const modal = document.getElementById('qr-modal');
  const shareUrl = getShareUrl();
  document.getElementById('share-url').textContent = shareUrl;
  setQrImage(shareUrl);
  modal.classList.add('open');
  modal.setAttribute('aria-hidden', 'false');
}

function closeQrModal() {
  const modal = document.getElementById('qr-modal');
  modal.classList.remove('open');
  modal.setAttribute('aria-hidden', 'true');
}

async function copyShareUrl() {
  const shareUrl = getShareUrl();
  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(shareUrl);
    } else {
      const ta = document.createElement('textarea');
      ta.value = shareUrl;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      ta.remove();
    }
    showToast('링크를 복사했어요 ✨');
  } catch (e) {
    showToast('복사에 실패했어요. 링크를 길게 눌러 복사해 주세요.');
  }
}

async function nativeShare() {
  const shareUrl = getShareUrl();
  try {
    if (navigator.share) {
      await navigator.share({
        title: 'Luna Elementum',
        text: '달 위상 · 4원소 의식 · 루나 타로 앱',
        url: shareUrl
      });
      return;
    }
    await copyShareUrl();
  } catch (e) {
    if (String(e).includes('AbortError')) return;
    await copyShareUrl();
  }
}

const RANKS = [

const MINOR_ARCANA = Object.entries(SUITS).flatMap(([suitKey, suit]) => {
  return RANKS.map((rank, idx) => ({
    id: `m-${suitKey}-${idx + 1}`,
    arcana: 'minor',
    suit: suitKey,
    nameKo: `${suit.nameKo} ${rank[1]}`,
    nameEn: `${rank[0]} of ${suit.nameEn}`,
    symbol: suit.symbol,
    keywords: [...suit.theme.slice(0, 2), ...rank[2]].slice(0, 4),
    upMsg: `${suit.up} ${rank[3]}`,
    revMsg: `${suit.rev} ${rank[4]}`
  }));
});

const TAROT_DECK = [...MAJOR_ARCANA, ...MINOR_ARCANA];
const TAROT_POSITIONS = ['과거', '현재', '미래'];

function getTodayKey() {
  const d = new Date();
  return `luna-tarot-${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

function seedRandom(seed) {
  let state = seed >>> 0;
  return function() {
    state = (1664525 * state + 1013904223) >>> 0;
    return state / 4294967296;
  };
}

function hashString(str) {
  let h = 2166136261;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}

function getTarotContext() {
  const phaseIndex = currentPhaseData ? currentPhaseData.phaseIndex : 0;
  return {
    phaseIndex,
    element: currentElement || 'air',
    intro: TAROT_PHASE_INTROS[currentElement || 'air'][phaseIndex] || TAROT_PHASE_INTROS.air[0]
  };
}

function drawDailyTarot() {
  const todayKey = getTodayKey();
  const saved = localStorage.getItem(todayKey);
  if (saved) {
    try { return JSON.parse(saved); } catch (e) {}
  }

  const d = new Date();
  const dateSeed = `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
  const seed = hashString(dateSeed + '-luna-elementum-complete');
  const rand = seedRandom(seed);

  const picked = [];
  const used = new Set();
  while (picked.length < 3) {
    const idx = Math.floor(rand() * TAROT_DECK.length);
    if (used.has(idx)) continue;
    used.add(idx);
    const card = TAROT_DECK[idx];
    picked.push({
      id: card.id,
      reversed: rand() < 0.38
    });
  }

  localStorage.setItem(todayKey, JSON.stringify(picked));
  return picked;
}

function getCardById(id) {
  return TAROT_DECK.find(card => String(card.id) === String(id));
}

function renderTarot() {
  const resultEl = document.getElementById('tarot-result');
  const context = getTarotContext();
  const draws = drawDailyTarot();
  const cards = draws.map(getCardById).filter(Boolean);
  if (!cards.length) return;

  const intro = `${context.intro} ${PHASES[context.phaseIndex].emoji} ${PHASES[context.phaseIndex].ko} · ${ELEMENT_LABELS[context.element]}`;

  resultEl.innerHTML = `
    <div class="tarot-intro">${intro}</div>
    <div class="tarot-grid">
      ${cards.map((card, idx) => {
        const reversed = !!draws[idx].reversed;
        const badge = reversed ? '역방향' : '정방향';
        const message = reversed ? card.revMsg : card.upMsg;
        return `
          <article class="tarot-card">
            <div class="tarot-card-top">
              <span>${TAROT_POSITIONS[idx]}</span>
              <span>${card.arcana === 'major' ? 'MAJOR' : (SUITS[card.suit]?.nameEn || '').toUpperCase()}</span>
            </div>
            <div class="tarot-card-visual">${card.symbol}</div>
            <div class="tarot-card-body">
              <div class="tarot-card-name">${card.nameKo}<small>${card.nameEn}</small></div>
              <div class="tarot-badge">${badge}</div>
              <div class="tarot-keywords">${card.keywords.join(' · ')}</div>
              <div class="tarot-message">${message}</div>
            </div>
          </article>
        `;
      }).join('')}
    </div>
    <div class="tarot-footer-note">오늘의 카드 결과는 하루 동안 저장됩니다. 원소를 바꾸면 해석의 분위기만 달라지고 카드는 유지돼요.</div>
  `;
}

function setupInteractiveFeatures() {
  const qrOpenBtn = document.getElementById('qr-open-btn');
  const qrCloseBtn = document.getElementById('qr-close-btn');
  const qrModal = document.getElementById('qr-modal');
  const copyBtn = document.getElementById('copy-link-btn');
  const shareBtn = document.getElementById('share-btn');
  const tarotBtn = document.getElementById('tarot-draw-btn');

  qrOpenBtn?.addEventListener('click', openQrModal);
  qrCloseBtn?.addEventListener('click', closeQrModal);
  copyBtn?.addEventListener('click', copyShareUrl);
  shareBtn?.addEventListener('click', nativeShare);
  tarotBtn?.addEventListener('click', () => {
    renderTarot();
    showToast('오늘의 루나 타로를 펼쳤어요 🔮');
  });

  qrModal?.addEventListener('click', (e) => {
    if (e.target === qrModal) closeQrModal();
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeQrModal();
  });
}

/* =============================================
   INIT
============================================= */
function init() {
  updateDate();
  updateMoon();
  selectElement(currentElement);
  setupInteractiveFeatures();
  if (localStorage.getItem(getTodayKey())) {
    renderTarot();
  }
}

init();

============================================= */

  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
